<div class="container">
  <h2>Create Character</h2>

  <form #characterForm="ngForm" (ngSubmit)="addCharacter()">

    <input
      type="text"
      name="name"
      [(ngModel)]="model.name"
      placeholder="Character Name"
      required
    />

    <select name="gender" [(ngModel)]="model.gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <select name="class" [(ngModel)]="model.class" required>
      <option value="">Select Class</option>
      <option>Warrior</option>
      <option>Mage</option>
      <option>Rogue</option>
    </select>

    <button type="submit">Create Character</button>
  </form>

  <h3>Character List</h3>

  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Gender</th>
      <th>Class</th>
    </tr>

    <tr *ngFor="let char of characters">
      <td>{{ char.id }}</td>
      <td>{{ char.name }}</td>
      <td>{{ char.gender }}</td>
      <td>{{ char.class }}</td>
    </tr>
  </table>
</div>

<section class="signin-card">
  <h2>Sign In</h2>

  <form [formGroup]="signinForm" (ngSubmit)="onSubmit()">
    <label>Email</label>
    <input type="email" formControlName="email" placeholder="test@demo.com">

    <label>Password</label>
    <input type="password" formControlName="password" placeholder="password123">

    <button type="submit" [disabled]="signinForm.invalid">
      Sign In
    </button>
  </form>
</section>
